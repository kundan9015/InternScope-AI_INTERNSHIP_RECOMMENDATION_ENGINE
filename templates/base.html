<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}AI Internship Recommendation Engine{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
    {% block head %}{% endblock %}
</head>
<body>
    <div class="bg-noise"></div>
    <header class="site-header">
        <a href="{{ url_for('home') }}" class="logo">InternScope AI</a>
        <nav class="site-nav">
            <a href="{{ url_for('home') }}">Upload Resume</a>
            <a href="{{ url_for('dashboard_page') }}">Dashboard</a>
            <a href="{{ url_for('recommendations_page') }}">Recommendations</a>
        </nav>
    </header>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>Designed and developed by Kundan Kumawat.</p>
        <div class="footer-links">
            <a href="https://www.linkedin.com" target="_blank" rel="noopener">LinkedIn</a>
            <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
            <a href="https://example-portfolio.vercel.app" target="_blank" rel="noopener">Portfolio</a>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
